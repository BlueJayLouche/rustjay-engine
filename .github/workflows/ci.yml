name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-linux:
    name: Rust (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NDI is intentionally opt-in (it needs a proprietary SDK), so CI builds the
      # default feature set (webcam, no ndi). These deps cover alsa (cpal) and the
      # v4l/udev webcam path (nokhwa).
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config clang ninja-build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Validate WGSL shaders
        run: |
          cargo install naga-cli --locked
          naga examples/waaaves/src/shaders/block_a.wgsl
          naga examples/waaaves/src/shaders/block_b.wgsl
          naga examples/waaaves/src/shaders/block_c.wgsl
      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  rust-windows:
    name: Rust (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cmake and ninja
        run: choco install cmake ninja --installargs 'ADD_CMAKE_TO_PATH=System' -y
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      # Skip two examples that need proprietary SDKs unavailable on CI:
      #  - videowall: apriltag-sys is POSIX-only C (pthreads in workerpool.c),
      #    can't build under MSVC.
      #  - decklink-input: its build.rs panics without the Blackmagic DeckLink SDK.
      # Spout — the reason for the Windows job — lives in rustjay-io, unaffected.
      - run: cargo check --workspace --exclude videowall --exclude decklink-input
