name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-linux:
    name: Rust (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NDI is intentionally opt-in (it needs a proprietary SDK), so CI builds the
      # default feature set (webcam, no ndi). These deps cover alsa (cpal) and the
      # v4l/udev webcam path (nokhwa). mesa-vulkan-drivers gives wgpu a software
      # (lavapipe) adapter so rustjay-projection's GPU tests run on the headless runner.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config clang ninja-build mesa-vulkan-drivers libvulkan1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Validate WGSL shaders
        run: |
          cargo install naga-cli --locked
          naga examples/waaaves/src/shaders/block_a.wgsl
          naga examples/waaaves/src/shaders/block_b.wgsl
          naga examples/waaaves/src/shaders/block_c.wgsl
      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  rust-windows:
    name: Rust (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      # apriltag's workerpool.c is pthread-only; MSVC has no pthread.h. vcpkg's
      # pthreads (pthreads4w) provides the header + pthreadVC3.lib. The
      # static-md triplet links it INTO the binary (no runtime DLL) while
      # keeping the dynamic CRT that Rust-MSVC uses. apriltag-sys 0.3's build.rs
      # picks it up via the two env vars below.
      - name: Cache vcpkg pthreads
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          # Literal path: C:\vcpkg is the GitHub-hosted runner's vcpkg root
          # (== VCPKG_INSTALLATION_ROOT), which the ${{ env }} context doesn't expose.
          path: C:\vcpkg\installed
          key: vcpkg-pthreads-x64-windows-static-md-v1
      - name: Install pthreads shim for apriltag
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: vcpkg install pthreads:x64-windows-static-md
      - name: Point apriltag-sys at the pthread shim
        shell: pwsh
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          "APRILTAG_SYS_WINDOWS_PTHREAD_INCLUDE_DIR=$vcpkg\include"           >> $env:GITHUB_ENV
          "APRILTAG_SYS_WINDOWS_PTHREAD_STATIC_LIB=$vcpkg\lib\pthreadVC3.lib" >> $env:GITHUB_ENV
      # decklink-input's build.rs panics without the proprietary Blackmagic SDK.
      - run: cargo check --workspace --exclude decklink-input
