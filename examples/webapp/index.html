<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustJay Delta — Web</title>
    <link data-trunk rel="copy-dir" href="ui/dist"/>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #root > * {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1280" height="720"></canvas>
    <div id="root"></div>

    <script type="module">
        // Trunk initialises the WASM module and fires TrunkApplicationStarted,
        // exposing all wasm-bindgen exports on window.wasmBindings.
        window.addEventListener('TrunkApplicationStarted', async () => {
            const { start, update_webcam_frame, set_delay_r, set_delay_g, set_delay_b, set_mix } =
                window.wasmBindings;

            try {
                await start();
            } catch (err) {
                console.error('WebGPU init failed:', err);
                return;
            }

            window.rustjay = { set_delay_r, set_delay_g, set_delay_b, set_mix };

            let stream;
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                });
            } catch (err) {
                console.error('Webcam access failed:', err);
                return;
            }

            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            await video.play();

            const c = document.createElement('canvas');
            const ctx = c.getContext('2d', { willReadFrequently: true });
            const target = document.getElementById('canvas');

            function tick() {
                if (video.readyState >= 2) {
                    const w = target.width;
                    const h = target.height;
                    c.width = w;
                    c.height = h;
                    ctx.drawImage(video, 0, 0, w, h);
                    const img = ctx.getImageData(0, 0, w, h);
                    const data = new Uint8Array(img.data.buffer, img.data.byteOffset, img.data.byteLength);
                    update_webcam_frame(data, w, h);
                }
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);

            // trunk copy-dir maps ui/dist/ → dist/ in the output
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'dist/assets/index.js';
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
