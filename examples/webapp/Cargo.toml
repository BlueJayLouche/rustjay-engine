[package]
name = "webapp"
version = "0.1.0"
edition = "2021"
description = "Delta effect in browser — WASM + WebGPU + React"

[lib]
crate-type = ["cdylib"]

[dependencies]
wgpu = { version = "29.0", default-features = false, features = ["webgpu", "wgsl"] }
wasm-bindgen = "0.2.99"
wasm-bindgen-futures = "0.4.49"
web-sys = { version = "0.3.76", features = [
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "HtmlVideoElement",
    "CanvasRenderingContext2d",
    "ImageData",
    "MediaDevices",
    "MediaStream",
    "MediaStreamConstraints",
    "Navigator",
    "console",
] }
js-sys = "0.3.76"
bytemuck = { version = "1.21", features = ["derive"] }
console_error_panic_hook = "0.1"
log = "0.4"
console_log = "1.0"

[profile.release]
opt-level = 3
lto = true
