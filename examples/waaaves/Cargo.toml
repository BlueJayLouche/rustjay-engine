[package]
name = "waaaves"
version = "0.1.0"
edition = "2021"
description = "Multi-pass feedback pipeline — proves engine multi-pass rendering"

[dependencies]
rustjay-engine = { workspace = true }
bytemuck       = { workspace = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
anyhow         = { workspace = true }
log            = { workspace = true }
imgui          = { workspace = true }
wgpu           = { workspace = true }
env_logger     = "0.11"
rfd            = "0.15"

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"

[features]
default = ["ndi", "webcam"]
ndi     = ["rustjay-engine/ndi"]
webcam  = ["rustjay-engine/webcam"]
link    = ["rustjay-engine/link"]
prodj   = ["rustjay-engine/prodj"]
mtc     = ["rustjay-engine/mtc"]
