<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>__APP__ // Presets</title>
<style>
  :root {
    --bg:        #07090b;
    --surface:   #0c1014;
    --surface-2: #11161c;
    --hair:      rgba(255,255,255,0.06);
    --hair-2:    rgba(255,255,255,0.12);
    --ink:       #e8ebee;
    --ink-2:     #aab1b9;
    --ink-3:     #6a7280;
    --ink-4:     #3a4048;
    --amber:     oklch(0.80 0.16 75);
    --amber-d:   oklch(0.55 0.14 75);
    --signal:    oklch(0.78 0.18 145);
    --alert:     oklch(0.70 0.20 25);
    --mono:      ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Monaco, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: var(--mono);
    color: var(--ink);
    min-height: 100vh;
    padding: 14px 14px 40px;
    touch-action: manipulation;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum" 1, "zero" 1, "cv01" 1;
  }
  .frame { max-width: 520px; margin: 0 auto; }
  .hud {
    position: relative;
    border: 1px solid var(--hair-2);
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    padding: 14px 16px 12px;
    margin-bottom: 18px;
  }
  .hud-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .hud-title h1 {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .hud-title .slash { color: var(--amber); }
  .hud-title .sub { color: var(--ink-3); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }

  .status {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink-4);
  }
  .status.connected { color: var(--signal); }
  .status.connected .dot { background: var(--signal); }
  .status.disconnected { color: var(--alert); }
  .status.disconnected .dot { background: var(--alert); }

  .btn {
    appearance: none;
    background: transparent;
    border: 1px solid var(--hair-2);
    color: var(--ink-2);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn:hover { border-color: var(--amber-d); color: var(--ink); }
  .btn.primary {
    background: var(--amber);
    color: #0a0a0a;
    border-color: var(--amber);
    font-weight: 700;
  }
  .btn.primary:hover { background: oklch(0.75 0.16 75); }
  .btn.danger { border-color: var(--alert); color: var(--alert); }
  .btn.danger:hover { background: color-mix(in oklab, var(--alert) 14%, transparent); }

  .section { margin-bottom: 18px; }
  .section-head {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-2);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-head .rule {
    flex: 1; height: 1px;
    background-image: linear-gradient(to right, var(--hair-2) 50%, transparent 50%);
    background-size: 6px 1px;
  }

  .save-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .save-row input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--hair-2);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 10px;
  }
  .save-row input:focus { outline: none; border-color: var(--amber-d); }

  .preset-list {
    border: 1px solid var(--hair);
    background: var(--surface);
  }
  .preset-item {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--hair);
    font-size: 12px;
  }
  .preset-item:last-child { border-bottom: none; }
  .preset-item .idx {
    color: var(--ink-4);
    font-size: 10px;
    min-width: 24px;
  }
  .preset-item .name { color: var(--ink); }
  .preset-item.loading .name { color: var(--ink-3); }

  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    border: 1px solid var(--alert);
    color: var(--ink);
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 0.08em;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .empty {
    text-align: center;
    color: var(--ink-3);
    padding: 24px 16px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px dashed var(--hair-2);
  }
</style>
</head>
<body>
<!-- panels open in new tabs; requires popup permission on mobile browsers -->
<div class="frame">
  <header class="hud">
    <div class="hud-title">
      <h1>__APP__<span class="slash">/</span>PRESETS</h1>
      <span class="sub">Save / Load / Delete</span>
    </div>
    <div class="status disconnected" id="status">
      <span class="dot"></span>
      <span id="status-text">OFFLINE</span>
    </div>
  </header>

  <div class="section">
    <div class="section-head">
      <span>Save New</span>
      <span class="rule"></span>
    </div>
    <div class="save-row">
      <input type="text" id="save-name" placeholder="Preset name…" maxlength="64"
             onkeydown="if(event.key==='Enter')savePreset()">
      <button class="btn primary" onclick="savePreset()">Save</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <span>Presets</span>
      <span class="rule"></span>
      <button class="btn" onclick="refreshPresets()">Refresh</button>
    </div>
    <div class="preset-list" id="preset-list">
      <div class="empty">No presets</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const APP_NAME = "__APP__";
  const appNameLower = APP_NAME.toLowerCase();
  const token = window.RUSTJAY_TOKEN || '';
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = wsProtocol + '//' + window.location.host + '/' + appNameLower + '/ws?token=' + encodeURIComponent(token);
  const ws = new WebSocket(wsUrl);

  let presets = [];
  let saveTimeout = null;

  function setStatus(stateName, text) {
    const s = document.getElementById('status');
    s.className = 'status ' + stateName;
    document.getElementById('status-text').textContent = text;
  }
  ws.onopen = () => {
    setStatus('connected', 'ONLINE');
    refreshPresets();
  };
  ws.onclose = () => setStatus('disconnected', 'OFFLINE');
  ws.onerror = () => setStatus('disconnected', 'ERROR');

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'preset_state') {
      presets = msg.presets || [];
      renderPresets();
      if (saveTimeout) {
        clearTimeout(saveTimeout);
        saveTimeout = null;
        document.getElementById('save-name').value = '';
        showToast('Saved');
      }
    }
  };

  function sendCmd(cmd) {
    fetch('/' + appNameLower + '/cmd?token=' + encodeURIComponent(token), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cmd)
    });
  }

  function refreshPresets() {
    sendCmd({ type: 'preset', action: 'list' });
  }

  function savePreset() {
    const name = document.getElementById('save-name').value.trim();
    if (!name) return;
    if (name.length > 64 || name.includes('/') || name.includes('\\') || name.includes('..')) {
      showToast('Invalid name');
      return;
    }
    sendCmd({ type: 'preset', action: 'save', name });
    saveTimeout = setTimeout(() => {
      saveTimeout = null;
      showToast('Save failed — is the filesystem writable?');
    }, 2000);
  }

  function loadPreset(index) {
    sendCmd({ type: 'preset', action: 'load', index });
    const items = document.querySelectorAll('.preset-item');
    if (items[index]) items[index].classList.add('loading');
    setTimeout(() => {
      if (items[index]) items[index].classList.remove('loading');
    }, 500);
  }

  function deletePreset(index) {
    if (!confirm('Delete preset #' + index + '?')) return;
    sendCmd({ type: 'preset', action: 'delete', index });
  }

  function renderPresets() {
    const list = document.getElementById('preset-list');
    if (!presets || presets.length === 0) {
      list.innerHTML = '<div class="empty">No presets</div>';
      return;
    }
    list.innerHTML = '';
    presets.forEach(p => {
      const item = document.createElement('div');
      item.className = 'preset-item';
      item.innerHTML = `
        <span class="idx">${String(p.index).padStart(2,'0')}</span>
        <span class="name">${escapeHtml(p.name)}</span>
        <button class="btn" onclick="loadPreset(${p.index})">Load</button>
        <button class="btn danger" onclick="deletePreset(${p.index})">✕</button>
      `;
      list.appendChild(item);
    });
  }

  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
